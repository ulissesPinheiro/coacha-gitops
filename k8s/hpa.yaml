apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: coacha-hpa
  namespace: coacha-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: coacha-deploy
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50  # escala se CPU média dos pods > 50%
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15   # reage rápido ao subir (demo)
    scaleDown:
      stabilizationWindowSeconds: 30   # espera 30s antes de desescalar
